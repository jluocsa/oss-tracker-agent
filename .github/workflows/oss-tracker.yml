name: OSS Tracker Agent

# Daily PR triage + email digest.
#
# Cron is 09:00 UTC = 1 AM PST (Nov–Mar) / 2 AM PDT (Mar–Nov).
# GitHub Actions cron is UTC-only, so DST drifts the local hour by 1.
# For strict 1 AM Pacific year-round, see the two-cron pattern in README.md
# ("Install the daily 1:00 AM PST schedule" section).
#
# REQUIRED SECRETS (Repo Settings → Secrets and variables → Actions → Secrets):
#   GH_PAT_OSS_TRACKER      classic PAT with `repo` + `workflow` scopes
#                           (needed to view/rerun checks and update branches
#                            on external repos like microsoft/graphrag etc.)
#
#   --- Pick ONE LLM provider ---
#   OPENAI_API_KEY          your OpenAI key (direct OpenAI)
#     -- OR --
#   AZURE_OPENAI_ENDPOINT       https://<resource>.cognitiveservices.azure.com/
#   AZURE_OPENAI_API_KEY        key1 of the AI Services / Foundry resource
#   AZURE_OPENAI_CHAT_MODEL     deployment name (e.g. `gpt-5`)
#   AZURE_OPENAI_API_VERSION    e.g. `2025-03-01-preview`
#
# OPTIONAL EMAIL SECRETS (omit to skip email digest entirely):
#   SMTP_USERNAME, SMTP_PASSWORD, NOTIFY_EMAIL_FROM, NOTIFY_EMAIL_TO
#
# OPTIONAL VARIABLES (Settings → Secrets and variables → Actions → Variables):
#   GH_AUTHOR               default: jluocsa
#   IGNORE_REPOS            default: jluocsa/Practice-Exam
#   OPENAI_CHAT_MODEL       default: gpt-4o-mini (only used with direct OpenAI)

on:
  schedule:
    # Daily at 09:00 UTC = 1 AM PST (winter) / 2 AM PDT (summer).
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the actual email send (log only)'
        type: boolean
        default: false
      verbose:
        description: 'DEBUG-level logging'
        type: boolean
        default: false

concurrency:
  group: oss-tracker
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  triage:
    name: Daily PR triage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need a real token (not GITHUB_TOKEN with restricted contents) so we can push RUN_HISTORY.md.
          token: ${{ secrets.GH_PAT_OSS_TRACKER }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure gh CLI
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_OSS_TRACKER }}
        run: |
          gh --version
          gh auth status

      - name: Run OSS Tracker Agent
        env:
          # Model — pick OpenAI direct OR Azure OpenAI (agent prefers OPENAI_API_KEY if both set)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL || 'gpt-4o-mini' }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_CHAT_MODEL: ${{ secrets.AZURE_OPENAI_CHAT_MODEL }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}

          # gh CLI auth
          GH_TOKEN: ${{ secrets.GH_PAT_OSS_TRACKER }}

          # Tracker config
          GH_AUTHOR: ${{ vars.GH_AUTHOR || 'jluocsa' }}
          IGNORE_REPOS: ${{ vars.IGNORE_REPOS || 'jluocsa/Practice-Exam' }}
          REFRESH_SCRIPT: ''   # CI skips the local refresh — agent uses gh directly
          AUTO_RERUN_FAILED_CHECKS: 'true'
          AUTO_UPDATE_BRANCH: 'true'
          DEEP_DIVE_ENABLED: ${{ vars.DEEP_DIVE_ENABLED || 'true' }}
          DEEP_DIVE_MAX_PRS: ${{ vars.DEEP_DIVE_MAX_PRS || '3' }}
          SELF_REVIEW_ENABLED: ${{ vars.SELF_REVIEW_ENABLED || 'true' }}
          # Copilot coding-agent dispatch — default OFF.
          # Flip AUTO_INVOKE_COPILOT_AGENT=true (repo Variables) to enable.
          AUTO_INVOKE_COPILOT_AGENT: ${{ vars.AUTO_INVOKE_COPILOT_AGENT || 'false' }}
          COPILOT_AGENT_REPO_ALLOWLIST: ${{ vars.COPILOT_AGENT_REPO_ALLOWLIST || 'jluocsa/*' }}
          COPILOT_AGENT_MIN_CONFIDENCE: ${{ vars.COPILOT_AGENT_MIN_CONFIDENCE || 'high' }}
          COPILOT_AGENT_MAX_DISPATCHES_PER_RUN: ${{ vars.COPILOT_AGENT_MAX_DISPATCHES_PER_RUN || '2' }}

          # Quick click-button actions — all default OFF, all scoped via QUICK_ACTIONS_REPO_ALLOWLIST.
          QUICK_ACTIONS_REPO_ALLOWLIST: ${{ vars.QUICK_ACTIONS_REPO_ALLOWLIST || 'jluocsa/*' }}
          AUTO_ENABLE_AUTO_MERGE: ${{ vars.AUTO_ENABLE_AUTO_MERGE || 'false' }}
          AUTO_MERGE_METHOD: ${{ vars.AUTO_MERGE_METHOD || 'squash' }}
          AUTO_MARK_READY_FOR_REVIEW: ${{ vars.AUTO_MARK_READY_FOR_REVIEW || 'false' }}
          AUTO_APPROVE_WORKFLOW_RUN: ${{ vars.AUTO_APPROVE_WORKFLOW_RUN || 'false' }}
          AUTO_RESOLVE_REVIEW_THREADS: ${{ vars.AUTO_RESOLVE_REVIEW_THREADS || 'false' }}
          AUTO_DISMISS_STALE_REVIEWS: ${{ vars.AUTO_DISMISS_STALE_REVIEWS || 'false' }}

          # Persistent run history (appended to RUN_HISTORY.md, then pushed back to main with [skip ci]).
          RUN_HISTORY_PATH: RUN_HISTORY.md
          RUN_HISTORY_RUN_ID: ${{ github.run_id }}
          RUN_HISTORY_TRIGGER: ${{ github.event_name }}
          RUN_HISTORY_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          # Email
          SMTP_HOST: smtp.office365.com
          SMTP_PORT: '587'
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          EMAIL_DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
        run: |
          mkdir -p logs
          if [ "${{ inputs.verbose }}" = "true" ]; then
            python -m oss_tracker_agent.main --cli --verbose 2>&1 | tee logs/run.log
          else
            python -m oss_tracker_agent.main --cli 2>&1 | tee logs/run.log
          fi

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oss-tracker-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit run-history update
        if: always()
        run: |
          if [ ! -f RUN_HISTORY.md ]; then
            echo "RUN_HISTORY.md not present — nothing to commit."
            exit 0
          fi
          git config user.name  "oss-tracker-bot[automated]"
          git config user.email "oss-tracker-bot@users.noreply.github.com"
          git add RUN_HISTORY.md
          if git diff --cached --quiet -- RUN_HISTORY.md; then
            echo "No changes to RUN_HISTORY.md."
            exit 0
          fi
          git commit -m "chore(history): run ${{ github.run_id }} [skip ci]"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "history pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed — retrying"
            sleep $((i * 5))
          done
          echo "::warning::Could not push RUN_HISTORY.md after 3 attempts — entry recorded in artifact only."

      - name: Job summary
        if: always()
        run: |
          {
            echo "## OSS Tracker — $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            if [ -f logs/run.log ]; then
              echo "### Pipeline counts"
              echo '```'
              grep -E "snapshots: |classifications: |deep-dive analyses attached: |self-review verdict=|actions: " logs/run.log || true
              echo '```'

              # Extract the rendered drafter digest: everything from the last
              # occurrence of "## Needs your attention" or "## Quiet PRs" to
              # the line just before the next logger timestamp.
              echo ""
              echo "### Digest"
              awk '
                /^## (Needs your attention|Auto-actions taken|Quiet PRs)/ { capturing=1 }
                capturing && /^[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2},[0-9]{3} (INFO|DEBUG|WARNING|ERROR)/ { capturing=0; next }
                capturing { print }
              ' logs/run.log > logs/digest.md || true
              if [ -s logs/digest.md ]; then
                cat logs/digest.md
              else
                echo "_(no digest rendered — likely zero open PRs)_"
              fi

              echo ""
              echo "### Log tail"
              echo '```'
              tail -n 40 logs/run.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
